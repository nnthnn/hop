# hop configuration
# Copy to ~/.config/hop/config.toml
#
# All colors accept "#rrggbb" (opaque) or "#rrggbbaa" (with alpha).
# The last two hex digits are the alpha: 00 = transparent, ff = fully opaque.

[window]
position           = "center"   # "center" or "x,y"
outer_border_width = 0           # X11 border around the popup (px); 0 = no outer border
border             = "#6272a4ff" # outer border color
gap                = 0           # extra pixels of space between adjacent tiles
padding            = 0           # margin around the tile area (extends the window background)
last_row_position  = "center"    # alignment of tiles in an incomplete last row: left|center|right
border_radius      = 0           # corner radius for the popup background (px); 0 = square corners
# Popup background — visible in the border and gap areas around/between tiles.
# Default is fully transparent ("00" alpha) so the compositor shows through.
background         = "#282a36ff"
# Gradient direction for the window background.
# "none"       = flat fill (use background color as-is)
# "radial"     = opaque background at center, fades to transparent at the edges
# "vertical"   = transparent at top, background color at bottom
# "horizontal" = transparent at left, background color at right
# Combine with a semi-transparent background (e.g. "#282a3680") for best results.
background_gradient = "none"
# Apply compositor blur behind the entire popup window.
# When blur = true, hop will also ensure picom has blur-background = true and
# will configure blur-method / blur-strength below if they are not already set.
blur               = false
# picom blur method (dual_kawase, gaussian, box, kernel). Only written to picom's
# config if hop needs to enable blur-background itself.
blur_method        = "dual_kawase"
# picom blur strength. For dual_kawase: 1–20, higher = more blur.
blur_strength      = 5
# Opt-in: allow hop to edit your picom config (and reload picom) to match the
# blur, shadow, and corner settings here. Defaults to false so hop never touches
# picom.conf on its own. Set to true only if you want hop to manage picom's
# blur-background and exclude lists for you; otherwise configure picom yourself.
configure_picom    = false
# Show picom drop shadow on the popup. When false, hop adds itself to shadow-exclude.
shadow             = false
# Show picom rounded corners on the popup. When false, hop adds itself to
# rounded-corners-exclude.
corners            = false

[tile]
width        = 200
height       = 150
icon_size    = 64
border_width   = 4    # tile frame thickness (px)
border_radius  = 0    # corner radius for tile borders (px); 0 = square corners
padding        = 0    # pixels of padding inside each tile around content (icon + label)
background   = "#282a36cc"  # cc ≈ 80% opaque; use "ff" for solid, "00" for transparent
foreground   = "#f8f8f2ff"  # text and icon placeholder color
frame        = "#bd93f9ff"  # selected tile border
inactive     = "#44475aff"  # unselected tile border; "00" alpha = invisible border
# What to show inside each tile.
# "icon"      — app icon from _NET_WM_ICON or the XDG icon theme (default)
# "thumbnail" — live screenshot of the window via the compositor's backing pixmap.
#               Requires picom (or another COMPOSITE-extension compositor) to be running.
#               Falls back to icon automatically when the compositor is unavailable.
content      = "icon"
# When content = "thumbnail", also draw a small app icon in the bottom-right corner
# of each tile. Useful for identifying windows when thumbnails look similar.
icon_overlay      = true
icon_overlay_size = 32   # pixels; the icon is scaled to this size
# Apply compositor blur only behind each tile region (not the gaps between tiles).
# Set window.blur = false and tile.blur = true for tile-only blur.
blur         = false

[font]
name          = "Roboto"
size          = 11
# Drop shadow behind tile labels — helps readability on light tile backgrounds.
shadow        = false
# shadow_color: "auto" picks black or white based on WCAG contrast of the text color.
# Override with an explicit "#rrggbbaa" value if you prefer a specific shadow color.
shadow_color  = "auto"
shadow_offset = 1            # offset in pixels

[keys]
modifier = "Alt"
next     = "Tab"
prev     = "Shift+Tab"
cancel   = "Escape"
